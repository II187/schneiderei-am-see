<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schneiderei am See - Handwerk am Bodensee</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&amp;family=Source+Sans+Pro:wght@300;400;600&amp;display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #F5F1E8;
            --sand: #E8DFD0;
            --taupe: #A69B8D;
            --brown: #6B5B4F;
            --charcoal: #3D3530;
            --accent: #8B6914;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Source Sans Pro", sans-serif;
            background: var(--cream);
            color: var(--charcoal);
            line-height: 1.7;
        }
        header {
            background: white;
            padding: 1.5rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--sand);
        }
        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-family: "Cormorant Garamond", serif;
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--charcoal);
            text-decoration: none;
        }
        .logo span { font-weight: 400; font-style: italic; }
        nav { display: flex; gap: 3rem; }
        nav a {
            text-decoration: none;
            color: var(--brown);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .hero {
            min-height: 90vh;
            display: grid;
            grid-template-columns: 1fr 1fr;
            background: white;
        }
        .hero-content {
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 6rem;
            background: var(--cream);
        }
        .hero-label {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--taupe);
            margin-bottom: 1.5rem;
        }
        .hero h1 {
            font-family: "Cormorant Garamond", serif;
            font-size: clamp(2.5rem, 5vw, 4.5rem);
            font-weight: 500;
            line-height: 1.1;
            color: var(--charcoal);
            margin-bottom: 1.5rem;
        }
        .hero h1 em {
            font-style: italic;
            font-weight: 400;
            color: var(--accent);
        }
        .hero p {
            font-size: 1.15rem;
            color: var(--brown);
            max-width: 500px;
            margin-bottom: 2.5rem;
        }
        .btn {
            display: inline-block;
            padding: 1rem 2.5rem;
            background: var(--charcoal);
            color: white;
            text-decoration: none;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s;
        }
        .btn:hover { background: var(--accent); }
        .btn-outline {
            background: transparent;
            color: var(--charcoal);
            border: 1px solid var(--charcoal);
            margin-left: 1rem;
        }
        .btn-outline:hover {
            background: var(--charcoal);
            color: white;
        }
        .hero-image {
            background: linear-gradient(135deg, var(--taupe) 0%, var(--brown) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8rem;
        }
        @media (max-width: 768px) {
            nav { display: none; }
            .hero { grid-template-columns: 1fr; }
            .hero-content { padding: 4rem 2rem; order: 2; }
            .hero-image { min-height: 40vh; order: 1; }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-container">
            <a href="#" class="logo">Schneiderei <span>am See</span></a>
            <nav>
                <a href="#leistungen">Leistungen</a>
                <a href="#kontakt">Kontakt</a>
            </nav>
        </div>
    </header>
    <section class="hero">
        <div class="hero-content">
            <div class="hero-label">Seit 1989 in Romanshorn</div>
            <h1>Handwerk mit <em>Herz</em></h1>
            <p>In unserer Werkstatt am Bodensee verbinden wir traditionelles Schneiderhandwerk mit zeitgemaessem Design.</p>
            <div>
                <a href="#kontakt" class="btn">Termin vereinbaren</a>
                <a href="#leistungen" class="btn btn-outline">Leistungen</a>
            </div>
        </div>
        <div class="hero-image">&#x1F9F5;</div>
    </section>
</body>
</html>
